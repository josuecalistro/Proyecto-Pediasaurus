<main>
    <div class="container py-5">

    <form class="registro-form mx-auto">

        <div class="mb-3">

            <label for="nombre" class="form-label">
                Nombre
            </label>

            <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label for="email" class="form-label">
                Email
            </label>

            <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                required
            >

        </div>

        <button class="btn btn-success w-100" type="submit">
            Registrarse
        </button>

    </form>

</div>
