<!DOCTYPE html>
<html lang="es">

<head>
<title>Registro ARKpedia</title>

<meta name="description"
content="Crea una cuenta en ARKpedia para participar en la comunidad.">
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
>

<link rel="stylesheet" href="Css/styles.css">
<link
href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"
rel="stylesheet">
<meta name="author" content="Josué Calistro">


</head>



<body>


<header>
    <nav>
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="dinos.html">Dinos</a></li>
<li><a href="mapas.html">Mapas</a></li>
<li><a href="tienda.html">Tienda</a></li>
<li><a href="foro.html">Foro</a></li>
<li><a href="registro.html">Registro</a></li>
</ul>
</nav>

</header>



<main>
    <div class="container py-5">
        <div
    id="alerta-registro"
    class="alert alert-success fade d-none"
    role="alert"
>
    <strong>¡Bienvenido a PediaSaurio!</strong>
    Tu usuario se registró correctamente.
</div>

    <form id="form-registro" class="registro-form mx-auto">

        <div class="mb-3">

            <label for="nombre" class="form-label">
                Nombre
            </label>

            <input
                type="text"
                id="nombre"
                name="nombre"
                class="form-control"
                required
            >

        </div>

        <div class="mb-3">

            <label for="email" class="form-label">
                Email
            </label>

            <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                required
                autocomplete="name"
            >

        </div>

        <button class="btn btn-success w-100" type="submit">
            Registrarse
        </button>

    </form>

</div>
</main>
<footer>

    <p>
        © 2026 PediaSaurio - Proyecto académico Desarrollo Web
    </p>

</footer>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
></script>
<script
src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js">
</script>

<script>

AOS.init();

const formulario = document.getElementById("form-registro");

formulario.addEventListener("submit", function(e){

    e.preventDefault();

    const alerta = document.getElementById("alerta-registro");

    alerta.classList.remove("d-none");

    setTimeout(() => {
        alerta.classList.add("show");
    }, 10);

    formulario.reset();

    setTimeout(() => {

        alerta.classList.remove("show");

        setTimeout(() => {
            alerta.classList.add("d-none");
        }, 150);

    }, 3000);

});

</script>
</script>
</body>

</html>
